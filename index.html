<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hyderabad Coders</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b0f1a"/>
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #0b0f1a;
  overflow: hidden;
  color: white;
}

/* Animated Tech Grid Background */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background-image:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: moveGrid 20s linear infinite;
  z-index: -2;
}

@keyframes moveGrid {
  from { transform: translate(0,0); }
  to { transform: translate(-60px,-60px); }
}

/* Floating Glow */
body::after {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: radial-gradient(circle, rgba(0,255,255,0.15), transparent 70%);
  animation: floatGlow 8s ease-in-out infinite alternate;
  z-index: -1;
}

@keyframes floatGlow {
  from { transform: translate(-100px,-100px); }
  to { transform: translate(200px,200px); }
}

.container {
  text-align: center;
  backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.05);
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 0 60px rgba(0, 255, 255, 0.2);
  width: 350px;
  animation: fadeIn 1.2s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.logo {
  width: 100px;
  margin-bottom: 15px;
}

h1 {
  margin-bottom: 25px;
  font-weight: 600;
  letter-spacing: 1px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 13px;
  margin: 12px 0;
  border-radius: 12px;
  text-decoration: none;
  color: white;
  font-weight: 500;
  transition: 0.3s ease;
  border: none;
  cursor: pointer;
}

/* WhatsApp */
.whatsapp {
  background: #25D366;
}
.whatsapp:hover {
  box-shadow: 0 0 20px #25D366;
  transform: scale(1.05);
}

/* Instagram */
.instagram {
  background: linear-gradient(45deg,#f58529,#dd2a7b,#8134af,#515bd4);
}
.instagram:hover {
  box-shadow: 0 0 20px #dd2a7b;
  transform: scale(1.05);
}

/* LinkedIn */
.linkedin {
  background: #0077B5;
}
.linkedin:hover {
  box-shadow: 0 0 20px #0077B5;
  transform: scale(1.05);
}

/* Coming Soon */
.coming {
  background: rgba(255,255,255,0.1);
  cursor: not-allowed;
}
.coming:hover {
  box-shadow: 0 0 15px rgba(255,255,255,0.2);
}

.btn svg {
  width: 18px;
  height: 18px;
  fill: white;
}

footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

    Join Community

  <a href="https://www.instagram.com/hyderabad_coders_offcial?igsh=aXQwbTlkaXI5NzZ6" target="_blank" class="btn instagram">

</html>
